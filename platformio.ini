################## PICO 2 ##################

[pico2]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
upload_protocol = picotool
lib_archive = no
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
lib_deps = 
	Wire
	askuric/Simple FOC@^2.3.5
	simplefoc/SimpleDCMotor @ ^1.0.3
	adafruit/Adafruit_VL53L0X @ ^1.2.5

[env:pico2_tof]
extends = pico2
build_src_filter = +<2_pico2_tofMotor.cpp>

[env:pico2_motor]
extends = pico2
build_src_filter = +<3_pico2_motorTests.cpp>

################## ESP 32 ##################

[esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	Wire

[env:esp32_oled]
extends = esp32dev
lib_deps = 
	adafruit/Adafruit SSD1306 @ ^2.5.16
	adafruit/Adafruit GFX Library @ ^1.12.5
build_src_filter = +<1_esp32_tofToOled.cpp>